<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="650" viewBox="0 0 1000 650" role="img"><rect width="100%" height="100%" fill="#0b1020"/>
<style>
.title{font:700 24px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}.subtitle{font:500 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}.label{font:600 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#e5e7eb}.small{font:500 11px system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}.tiny{font:500 10px system-ui,-apple-system,Segoe UI,sans-serif;fill:#94a3b8}.arrow{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}.arrowBlue{stroke:#60a5fa;stroke-width:2.5;fill:none;marker-end:url(#arrowBlue)}.arrowOrange{stroke:#fb923c;stroke-width:2.5;fill:none;marker-end:url(#arrowOrange)}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
<marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#60a5fa"/></marker>
<marker id="arrowOrange" viewBox="0 0 10 10" refX="9" markerWidth="7" markerHeight="7" refY="5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#fb923c"/></marker>
</defs>
<text class="title" x="40" y="42">Sun example: same ephemeris input, two different displayed directions</text><rect x="50" y="90" width="430" height="470" rx="16" fill="#111827" stroke="#334155"/><text class="label" x="75" y="125">A. Whole-world FE vault branch</text><circle cx="265" cy="330" r="170" fill="#0b1324" stroke="#475569" stroke-width="2"/><circle cx="245" cy="405" r="7" fill="#22c55e" stroke="#bbf7d0" stroke-width="2"/><text class="small" x="260" y="410">observer</text><circle cx="160" cy="230" r="8" fill="#f97316" stroke="#fed7aa" stroke-width="2"/><text class="small" x="174" y="226">drawn Sun vault</text><path class="arrowOrange" d="M245 405L160 230"/><path class="arrowBlue" d="M245 405L118 438"/><text class="small" x="75" y="520" fill="#fb923c">Orange: straight bearing to drawn FE vault point</text><text class="small" x="75" y="540" fill="#60a5fa">Blue: app optical azimuth from local-sky transform</text><rect x="530" y="90" width="420" height="470" rx="16" fill="#111827" stroke="#334155"/><text class="label" x="555" y="125">B. Local elevation comparison</text><line x1="600" y1="330" x2="880" y2="330" stroke="#475569" stroke-width="2"/><path d="M600 330A140 140 0 0 1 880 330" fill="none" stroke="#334155"/><line x1="740" y1="330" x2="873.8" y2="312.0" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/><text class="small" x="555" y="410" fill="#60a5fa">app optical: el 7.67°</text><line x1="740" y1="330" x2="822.9" y2="223.5" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowOrange)"/><text class="small" x="555" y="435" fill="#fb923c">line to vault: el 52.09°</text><text class="label" x="555" y="475">Full 3D angular gap: 49.04°</text><text class="small" x="555" y="505">Sun RA 34.367° • Dec 14.016° • vault z 0.680</text></svg>
